services:
  - type: web
    name: live-ai-assistant-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./assistant.db
      - key: WEB_SEARCH_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
